<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mens Sim!</title>
  
  <!-- เรียกใช้ Tailwind CSS เพื่อความสวยงาม -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Map สำหรับ React -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
    }
  }
  </script>
  
  <!-- เรียกใช้ Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* เพิ่ม Animation สำหรับ Gamification */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    
    @keyframes pop {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body class="bg-slate-50 font-sans pb-12 min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';

    // --- ไอคอน SVG ---
    const CalendarIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const ArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
    const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>;
    const RotateCcw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
    const ChevronRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"></path></svg>;
    const ChevronLeft = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"></path></svg>;
    const Droplet = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>;
    const Trophy = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
    const Star = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
    const GamepadIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;

    // --- STREAMING_CHUNK: ข้อมูลเกม (Avatars, Leaderboard, Quiz) ---
    const avatars = [
      { id: 1, icon: "👩‍🔬", bg: "bg-pink-200" },
      { id: 2, icon: "🦸‍♀️", bg: "bg-purple-200" },
      { id: 3, icon: "🧚‍♀️", bg: "bg-green-200" },
      { id: 4, icon: "🥷", bg: "bg-slate-300" },
      { id: 5, icon: "🕵️‍♀️", bg: "bg-yellow-200" },
      { id: 6, icon: "👨‍🚀", bg: "bg-blue-200" },
      { id: 7, icon: "🧛‍♀️", bg: "bg-red-200" },
      { id: 8, icon: "🧙‍♀️", bg: "bg-indigo-200" }
    ];

    const mockLeaderboard = [
      { name: "พี่จีซู ม.2/1", avatar: "👩‍🔬", score: 400 },
      { name: "สมชาย รักวิทย์", avatar: "👨‍🚀", score: 300 },
      { name: "เด็กหญิงมานี", avatar: "🧚‍♀️", score: 200 },
      { name: "โดราเอมอน", avatar: "🦸‍♀️", score: 100 }
    ];

    const quizQuestions = [
      {
        question: "หากนางสาวเอเริ่มมีประจำเดือนวันแรกในวันที่ 1 มกราคม และเธอมีรอบเดือนปกติ 28 วัน วันแรกของประจำเดือนรอบถัดไปควรจะเป็นวันที่เท่าใด",
        options: ["วันที่ 27 มกราคม", "วันที่ 28 มกราคม", "วันที่ 29 มกราคม", "วันที่ 14 มกราคม"],
        correctAnswer: "วันที่ 29 มกราคม",
        explanation: "นับจากวันที่ 1 ไปอีก 28 วัน (1 + 28 = 29) ประจำเดือนรอบใหม่จะมาในวันที่ 29 มกราคม"
      },
      {
        question: "การนับระยะเวลาของ 'รอบเดือน' (Menstrual Cycle) ที่ถูกต้องควรเริ่มนับอย่างไร",
        options: [
          "นับจากวันสุดท้ายที่มีประจำเดือนจนถึงวันแรกที่มีประจำเดือนรอบถัดไป",
          "นับจากวันแรกที่มีประจำเดือนจนถึงวันแรกที่มีประจำเดือนรอบถัดไป",
          "นับจากวันไข่ตกจนถึงวันแรกที่มีประจำเดือน",
          "นับเฉพาะวันที่มีเลือดประจำเดือนไหลเท่านั้น"
        ],
        correctAnswer: "นับจากวันแรกที่มีประจำเดือนจนถึงวันแรกที่มีประจำเดือนรอบถัดไป",
        explanation: "รอบเดือน 1 รอบ เริ่มนับจาก 'วันแรก' ที่มีประจำเดือน ไปจนถึง 'วันก่อน' ที่ประจำเดือนรอบใหม่จะมา"
      },
      {
        question: "หากนางสาวบีมีรอบเดือน 28 วัน และประจำเดือนวันแรกของรอบนี้คือวันที่ 10 กุมภาพันธ์ วันที่คาดว่า 'ไข่จะตก' คือวันที่เท่าใด",
        options: ["วันที่ 24 กุมภาพันธ์", "วันที่ 23 กุมภาพันธ์", "วันที่ 14 กุมภาพันธ์", "วันที่ 17 กุมภาพันธ์"],
        correctAnswer: "วันที่ 24 กุมภาพันธ์",
        explanation: "วิธีคิด: ประจำเดือนรอบหน้าคือ 10 ก.พ. + 28 วัน = 10 มี.ค. (ปีปกติ ก.พ.มี 28 วัน) วันไข่ตกคือนับถอยหลัง 14 วันจากรอบหน้า (10 มี.ค. - 14 วัน = 24 ก.พ.)"
      },
      {
        question: "นางสาวซีมีรอบเดือนสม่ำเสมอ 30 วัน หากประจำเดือนวันแรกคือวันที่ 1 มีนาคม การตกไข่ของเธอควรเกิดขึ้นในวันที่เท่าใดของเดือนมีนาคม",
        options: ["วันที่ 14 มีนาคม", "วันที่ 15 มีนาคม", "วันที่ 16 มีนาคม", "วันที่ 17 มีนาคม"],
        correctAnswer: "วันที่ 17 มีนาคม",
        explanation: "วิธีคิดที่ง่ายที่สุดคือ 'ความยาวรอบเดือน - 14' (30 - 14 = 16) แปลว่าไข่ตกในวันที่ 16 ของรอบเดือน ถ้านับวันที่ 1 มีนาคมเป็นวันที่ 1 วันที่ 16 ของรอบเดือนก็คือวันที่ 17 มีนาคม (1 + 16 = 17)"
      }
    ];

    const addDays = (date, days) => {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    };

    const isSameDay = (date1, date2) => {
      if (!date1 || !date2) return false;
      return date1.getDate() === date2.getDate() &&
             date1.getMonth() === date2.getMonth() &&
             date1.getFullYear() === date2.getFullYear();
    };

    const monthNamesThai = [
      "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
      "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
    ];

    // --- STREAMING_CHUNK: Component หน้า Login / สร้าง Avatar ---
    const LoginScreen = ({ onStart }) => {
      const [name, setName] = useState("");
      const [selectedAvatar, setSelectedAvatar] = useState(avatars[0]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (name.trim()) {
          onStart({ name: name.trim(), avatar: selectedAvatar });
        }
      };

      return (
        <div className="max-w-md mx-auto px-4 pt-12 animate-pop">
          <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-pink-100">
            <div className="bg-gradient-to-r from-pink-500 to-indigo-500 p-8 text-center text-white">
              <GamepadIcon className="w-16 h-16 mx-auto mb-4 opacity-90 animate-float" />
              <h1 className="text-4xl font-black mb-2 drop-shadow-md tracking-wider">Mens Sim!</h1>
              <p className="text-pink-100 font-medium">เกมจำลองรอบเดือนและการตกไข่</p>
            </div>
            
            <form onSubmit={handleSubmit} className="p-8 space-y-6">
              <div>
                <label className="block text-gray-700 font-bold mb-3 text-center">เลือกอวตาร์ของคุณ</label>
                <div className="grid grid-cols-4 gap-3">
                  {avatars.map(av => (
                    <button
                      key={av.id}
                      type="button"
                      onClick={() => setSelectedAvatar(av)}
                      className={`text-3xl w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${
                        selectedAvatar.id === av.id 
                        ? `${av.bg} ring-4 ring-indigo-500 scale-110 shadow-lg` 
                        : 'bg-gray-50 hover:bg-gray-100 grayscale-[0.5] hover:grayscale-0'
                      }`}
                    >
                      {av.icon}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-gray-700 font-bold mb-2">ชื่อผู้เล่น</label>
                <input 
                  type="text" 
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="พิมพ์ชื่อของคุณที่นี่..."
                  className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-0 text-lg transition-all"
                  required
                />
              </div>

              <button 
                type="submit"
                disabled={!name.trim()}
                className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2"
              >
                เริ่มเกมเลย! <ArrowRight className="w-6 h-6" />
              </button>
            </form>
          </div>
        </div>
      );
    };

    // --- STREAMING_CHUNK: Component ปฏิทิน (คงไว้เหมือนเดิมเป๊ะ) ---
    const CalendarMonth = ({ currentDate, lastPeriodDate, ovulationDate, nextPeriodDate, onDateClick }) => {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      const days = [];
      for (let i = 0; i < firstDay; i++) {
        days.push(null); 
      }
      for (let i = 1; i <= daysInMonth; i++) {
        days.push(new Date(year, month, i));
      }

      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
          <div className="grid grid-cols-7 gap-2 text-center mb-2">
            {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => (
              <div key={d} className="text-xs font-bold text-gray-500">{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-2">
            {days.map((date, index) => {
              if (!date) return <div key={`empty-${index}`} className="h-10"></div>;
              
              const isPeriod = isSameDay(date, lastPeriodDate);
              const isNextPeriod = isSameDay(date, nextPeriodDate);
              const isOvulation = isSameDay(date, ovulationDate);
              
              let btnClass = "h-8 w-8 sm:h-10 sm:w-10 rounded-full flex items-center justify-center text-sm font-medium transition-all cursor-pointer hover:bg-gray-100 mx-auto";
              
              if (isPeriod) {
                btnClass = "h-8 w-8 sm:h-10 sm:w-10 rounded-full flex items-center justify-center text-sm font-bold bg-pink-500 text-white shadow-md shadow-pink-200 mx-auto";
              } else if (isNextPeriod) {
                btnClass = "h-8 w-8 sm:h-10 sm:w-10 rounded-full flex items-center justify-center text-sm font-bold bg-rose-100 text-rose-700 border-2 border-rose-400 mx-auto";
              } else if (isOvulation) {
                btnClass = "h-8 w-8 sm:h-10 sm:w-10 rounded-full flex items-center justify-center text-sm font-bold bg-indigo-500 text-white shadow-md shadow-indigo-200 mx-auto";
              } else {
                btnClass = "h-8 w-8 sm:h-10 sm:w-10 rounded-full flex items-center justify-center text-sm text-gray-700 hover:bg-pink-50 mx-auto";
              }

              return (
                <div key={date.toISOString()} className="relative flex flex-col items-center">
                  <button 
                    onClick={() => onDateClick(date)}
                    className={btnClass}
                  >
                    {date.getDate()}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const CycleSimulator = ({ onFinishSimulation }) => {
      const [cycleLength, setCycleLength] = useState(28);
      const [lastPeriodDate, setLastPeriodDate] = useState(null);
      const [currentDate, setCurrentDate] = useState(new Date());

      const nextPeriodDate = lastPeriodDate ? addDays(lastPeriodDate, cycleLength) : null;
      const ovulationDate = nextPeriodDate ? addDays(nextPeriodDate, -14) : null;

      const handlePrevMonth = () => setCurrentDate(addDays(new Date(currentDate.getFullYear(), currentDate.getMonth(), 1), -1));
      const handleNextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));

      return (
        <div className="max-w-4xl mx-auto px-4 animate-pop">
          <div className="text-center mb-8">
            <h1 className="text-2xl font-bold text-gray-800 flex items-center justify-center gap-2 mb-2">
              <CalendarIcon className="text-pink-500" />
              ด่านที่ 1: ปฏิทินจำลอง
            </h1>
            <p className="text-gray-600">กดเลือกวันแรกที่ประจำเดือนมาในปฏิทิน แล้วระบบจะคำนวณวันตกไข่ให้!</p>
          </div>

          <div className="grid lg:grid-cols-12 gap-8">
            <div className="space-y-6 lg:col-span-7">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-pink-100">
                <h2 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                  <Info className="text-pink-400 w-5 h-5" />
                  1. เลือกระยะเวลารอบเดือนของคุณ
                </h2>
                <div className="flex flex-wrap gap-3">
                  {[21, 28, 30, 32, 35].map(len => (
                    <button
                      key={len}
                      onClick={() => setCycleLength(len)}
                      className={`px-4 py-2 rounded-full font-semibold transition-all ${cycleLength === len ? 'bg-pink-500 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                    >
                      {len} วัน
                    </button>
                  ))}
                </div>
              </div>

              <div className="bg-white p-6 rounded-2xl shadow-sm border border-pink-100">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                  <h2 className="font-bold text-gray-800">2. จิ้มเลือก "วันแรก" ที่ประจำเดือนมา</h2>
                  <div className="flex gap-2 self-end sm:self-auto">
                    <button onClick={handlePrevMonth} className="p-2 rounded-full hover:bg-gray-100 border border-gray-200 shadow-sm"><ChevronLeft className="w-5 h-5 text-gray-600" /></button>
                    <button onClick={handleNextMonth} className="p-2 rounded-full hover:bg-gray-100 border border-gray-200 shadow-sm"><ChevronRight className="w-5 h-5 text-gray-600" /></button>
                  </div>
                </div>
                
                <div className="grid sm:grid-cols-2 gap-4">
                  {/* เดือนแรก */}
                  <div>
                    <div className="text-center font-bold text-pink-600 mb-2">
                      {monthNamesThai[currentDate.getMonth()]} {currentDate.getFullYear() + 543}
                    </div>
                    <CalendarMonth 
                      currentDate={currentDate}
                      lastPeriodDate={lastPeriodDate}
                      ovulationDate={ovulationDate}
                      nextPeriodDate={nextPeriodDate}
                      onDateClick={(date) => setLastPeriodDate(date)}
                    />
                  </div>
                  
                  {/* เดือนถัดไป */}
                  <div>
                    <div className="text-center font-bold text-pink-600 mb-2">
                      {monthNamesThai[new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1).getMonth()]} {new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1).getFullYear() + 543}
                    </div>
                    <CalendarMonth 
                      currentDate={new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1)}
                      lastPeriodDate={lastPeriodDate}
                      ovulationDate={ovulationDate}
                      nextPeriodDate={nextPeriodDate}
                      onDateClick={(date) => setLastPeriodDate(date)}
                    />
                  </div>
                </div>
              </div>
            </div>

            <div className="bg-gradient-to-br from-pink-50 to-indigo-50 p-6 rounded-2xl border border-pink-100 shadow-sm flex flex-col lg:col-span-5">
              <h2 className="font-bold text-xl text-gray-800 mb-6 flex items-center gap-2">
                ผลการวิเคราะห์รอบเดือน <span className="text-sm font-normal text-pink-500 bg-pink-100 px-3 py-1 rounded-full">สูตร -14 วัน</span>
              </h2>

              {lastPeriodDate ? (
                <div className="space-y-6 flex-1">
                  <div className="bg-white p-4 rounded-xl shadow-sm flex items-start gap-4 border-l-4 border-pink-500">
                    <div className="bg-pink-100 p-3 rounded-full"><Droplet className="text-pink-500 w-6 h-6" /></div>
                    <div>
                      <p className="text-sm text-gray-500 font-medium">ประจำเดือนวันแรก (รอบนี้)</p>
                      <p className="font-bold text-lg text-gray-800">
                        {lastPeriodDate.getDate()} {monthNamesThai[lastPeriodDate.getMonth()]} {lastPeriodDate.getFullYear() + 543}
                      </p>
                    </div>
                  </div>

                  <div className="flex justify-center text-gray-400"><ArrowRight className="w-6 h-6 rotate-90 md:rotate-0 md:hidden" /></div>

                  <div className="bg-white p-4 rounded-xl shadow-sm flex items-start gap-4 border-l-4 border-rose-400">
                    <div className="bg-rose-100 p-3 rounded-full font-bold text-rose-500 border border-rose-200">รอบถัดไป</div>
                    <div>
                      <p className="text-sm text-gray-500 font-medium">คาดว่าประจำเดือนจะมา (บวกไป {cycleLength} วัน)</p>
                      <p className="font-bold text-lg text-rose-600">
                        {nextPeriodDate.getDate()} {monthNamesThai[nextPeriodDate.getMonth()]} {nextPeriodDate.getFullYear() + 543}
                      </p>
                    </div>
                  </div>

                  <div className="bg-white p-5 rounded-xl shadow-md border-2 border-indigo-200 flex items-start gap-4 relative overflow-hidden">
                    <div className="absolute top-0 right-0 bg-indigo-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">สำคัญ!</div>
                    <div className="bg-indigo-100 p-3 rounded-full mt-2"><CheckCircle2 className="text-indigo-500 w-6 h-6" /></div>
                    <div>
                      <p className="text-sm text-indigo-500 font-bold mb-1">วันตกไข่ (นับถอยหลัง 14 วัน)</p>
                      <p className="font-black text-2xl text-indigo-700">
                        {ovulationDate.getDate()} {monthNamesThai[ovulationDate.getMonth()]}
                      </p>
                      <p className="text-xs text-gray-500 mt-2 bg-gray-50 p-2 rounded">
                        วิธีคิด: {nextPeriodDate.getDate()} {monthNamesThai[nextPeriodDate.getMonth()]} ถอยหลังไป 14 วัน
                      </p>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center text-gray-400 text-center">
                  <CalendarIcon className="w-16 h-16 mb-4 text-pink-200" />
                  <p>จิ้มเลือกวันที่ในปฏิทินเพื่อดูผลลัพธ์</p>
                </div>
              )}

              <button 
                onClick={onFinishSimulation}
                className="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg flex justify-center items-center gap-2"
              >
                เข้าใจแล้ว! ไปลุยแบบทดสอบกัน <ArrowRight className="w-5 h-5" />
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- STREAMING_CHUNK: Component แบบทดสอบ (มีนับคะแนน) ---
    const Quiz = ({ onComplete }) => {
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);

      const handleAnswer = (answer) => {
        if (selectedAnswer !== null) return;
        setSelectedAnswer(answer);
        if (answer === quizQuestions[currentQuestion].correctAnswer) {
          setScore(score + 100); // ข้อละ 100 คะแนน
        }
      };

      const handleNext = () => {
        if (currentQuestion < quizQuestions.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedAnswer(null);
        } else {
          onComplete(score); // ส่งคะแนนกลับไปหน้าหลักเพื่อขึ้น Leaderboard
        }
      };

      const q = quizQuestions[currentQuestion];
      const isAnswered = selectedAnswer !== null;

      return (
        <div className="max-w-3xl mx-auto px-4 animate-pop">
          <div className="mb-8 flex items-center justify-between">
            <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
              <GamepadIcon className="text-indigo-500 w-8 h-8" /> ด่านที่ 2: แบบทดสอบ
            </h1>
            <div className="flex gap-4">
              <span className="bg-yellow-100 text-yellow-700 px-4 py-1 rounded-full font-bold text-sm flex items-center gap-1">
                <Star className="w-4 h-4" /> {score} แต้ม
              </span>
              <span className="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full font-bold text-sm">
                ข้อ {currentQuestion + 1} / {quizQuestions.length}
              </span>
            </div>
          </div>

          <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200">
            <h2 className="text-xl text-gray-800 font-medium mb-6 leading-relaxed">
              {q.question}
            </h2>

            <div className="space-y-3 mb-8">
              {q.options.map((option, idx) => {
                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all font-medium ";
                if (!isAnswered) {
                  btnClass += "border-gray-200 text-gray-700 hover:border-pink-300 hover:bg-pink-50";
                } else if (option === q.correctAnswer) {
                  btnClass += "border-green-500 bg-green-50 text-green-700";
                } else if (option === selectedAnswer) {
                  btnClass += "border-red-400 bg-red-50 text-red-700";
                } else {
                  btnClass += "border-gray-100 opacity-50 text-gray-500";
                }

                return (
                  <button 
                    key={idx} 
                    onClick={() => handleAnswer(option)}
                    disabled={isAnswered}
                    className={btnClass}
                  >
                    <div className="flex justify-between items-center">
                      <span>{option}</span>
                      {isAnswered && option === q.correctAnswer && <CheckCircle2 className="w-5 h-5 text-green-500" />}
                    </div>
                  </button>
                );
              })}
            </div>

            {isAnswered && (
              <div className="bg-blue-50 border border-blue-100 p-5 rounded-xl mb-6 animate-pop">
                <p className="font-bold text-blue-800 mb-1 flex items-center gap-2">
                  <Info className="w-5 h-5" /> คำอธิบาย
                </p>
                <p className="text-blue-700 text-sm leading-relaxed">{q.explanation}</p>
              </div>
            )}

            <div className="flex justify-end">
              <button 
                onClick={handleNext}
                disabled={!isAnswered}
                className={`px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all ${isAnswered ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
              >
                {currentQuestion < quizQuestions.length - 1 ? 'ข้อต่อไป' : 'ดูอันดับคะแนน'} <ArrowRight className="w-5 h-5" />
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- STREAMING_CHUNK: Component กระดานผู้นำ (Leaderboard) ---
    const LeaderboardScreen = ({ user, score, onRestart }) => {
      // รวมคะแนนผู้เล่นปัจจุบันเข้ากับข้อมูลจำลอง แล้วจัดเรียง
      const allPlayers = [...mockLeaderboard, { name: user.name, avatar: user.avatar.icon, score: score, isMe: true }];
      allPlayers.sort((a, b) => b.score - a.score);

      return (
        <div className="max-w-2xl mx-auto px-4 pt-4 animate-pop">
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-yellow-300 to-yellow-500 rounded-full border-4 border-white shadow-lg mb-4">
              <Trophy className="w-12 h-12 text-white" />
            </div>
            <h1 className="text-3xl font-black text-gray-800">ภารกิจสำเร็จ!</h1>
            <p className="text-gray-600 mt-2 text-lg">คุณทำคะแนนได้ <span className="font-bold text-indigo-600">{score}</span> แต้ม</p>
          </div>

          <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden mb-8">
            <div className="bg-gray-50 border-b border-gray-200 p-4">
              <h2 className="font-bold text-gray-700 flex items-center gap-2">
                <Star className="w-5 h-5 text-yellow-500" /> กระดานผู้นำ (Leaderboard)
              </h2>
            </div>
            <div className="p-4 space-y-3">
              {allPlayers.map((player, index) => (
                <div 
                  key={index} 
                  className={`flex items-center justify-between p-4 rounded-2xl border-2 transition-all ${
                    player.isMe ? 'border-indigo-400 bg-indigo-50 shadow-sm' : 'border-transparent bg-white hover:bg-gray-50'
                  }`}
                >
                  <div className="flex items-center gap-4">
                    <div className={`font-black text-lg ${index === 0 ? 'text-yellow-500' : index === 1 ? 'text-gray-400' : index === 2 ? 'text-amber-700' : 'text-gray-400'}`}>
                      #{index + 1}
                    </div>
                    <div className="text-3xl">{player.avatar}</div>
                    <div className={`font-bold text-lg ${player.isMe ? 'text-indigo-700' : 'text-gray-700'}`}>
                      {player.name} {player.isMe && <span className="text-xs bg-indigo-500 text-white px-2 py-0.5 rounded-full ml-2 align-middle">คุณ</span>}
                    </div>
                  </div>
                  <div className="font-black text-xl text-gray-800">{player.score}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="flex justify-center">
            <button 
              onClick={onRestart}
              className="px-8 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl flex items-center gap-2 transition-all shadow-sm"
            >
              <RotateCcw className="w-5 h-5" /> เล่นใหม่อีกครั้ง
            </button>
          </div>
        </div>
      );
    };

    // --- STREAMING_CHUNK: แอปพลิเคชันหลัก (ตัวจัดการหน้าจอ) ---
    function App() {
      const [view, setView] = useState('login'); // 'login', 'simulator', 'quiz', 'leaderboard'
      const [user, setUser] = useState(null);
      const [finalScore, setFinalScore] = useState(0);

      const handleStartGame = (userData) => {
        setUser(userData);
        setView('simulator');
      };

      const handleQuizComplete = (score) => {
        setFinalScore(score);
        setView('leaderboard');
      };

      const handleRestart = () => {
        setView('login');
        setUser(null);
        setFinalScore(0);
      };

      return (
        <div>
          {/* Header ด้านบน (แสดงเมื่อไม่ใช่หน้า Login) */}
          {view !== 'login' && (
            <header className="bg-white border-b border-gray-200 sticky top-0 z-50">
              <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center text-2xl shadow-inner ${user?.avatar?.bg || 'bg-gray-200'}`}>
                    {user?.avatar?.icon}
                  </div>
                  <div className="hidden sm:block">
                    <div className="text-xs text-gray-500 font-bold uppercase tracking-wider">ผู้เล่น</div>
                    <div className="font-bold text-indigo-700 leading-tight">{user?.name}</div>
                  </div>
                </div>
                <div className="flex bg-gray-100 p-1.5 rounded-xl">
                  <button 
                    disabled={view === 'leaderboard'}
                    onClick={() => setView('simulator')}
                    className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${view === 'simulator' ? 'bg-white text-pink-600 shadow-sm' : 'text-gray-500 hover:text-gray-700 disabled:opacity-50'}`}
                  >
                    1. ปฏิทิน
                  </button>
                  <button 
                    disabled={view === 'leaderboard'}
                    onClick={() => setView('quiz')}
                    className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${view === 'quiz' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700 disabled:opacity-50'}`}
                  >
                    2. ทดสอบ
                  </button>
                </div>
              </div>
            </header>
          )}

          {/* ส่วนเนื้อหาหลัก */}
          <main className={view === 'login' ? '' : 'pt-8'}>
            {view === 'login' && <LoginScreen onStart={handleStartGame} />}
            {view === 'simulator' && <CycleSimulator onFinishSimulation={() => setView('quiz')} />}
            {view === 'quiz' && <Quiz onComplete={handleQuizComplete} />}
            {view === 'leaderboard' && <LeaderboardScreen user={user} score={finalScore} onRestart={handleRestart} />}
          </main>
        </div>
      );
    }

    // --- สั่ง Render ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
