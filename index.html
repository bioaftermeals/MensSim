<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mens Sim!</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans pb-12">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { createRoot } = ReactDOM;

    const CalendarIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    
    const quizQuestions = [
      { question: "หากนางสาวเอเริ่มมีประจำเดือนวันแรกในวันที่ 1 มกราคม และเธอมีรอบเดือนปกติ 28 วัน วันแรกของประจำเดือนรอบถัดไปควรจะเป็นวันที่เท่าใด", options: ["วันที่ 27 มกราคม", "วันที่ 28 มกราคม", "วันที่ 29 มกราคม", "วันที่ 14 มกราคม"], correctAnswer: "วันที่ 29 มกราคม", explanation: "นับจากวันที่ 1 ไปอีก 28 วัน (1 + 28 = 29) ประจำเดือนรอบใหม่จะมาในวันที่ 29 มกราคม" },
      { question: "การนับระยะเวลาของ 'รอบเดือน' (Menstrual Cycle) ที่ถูกต้องควรเริ่มนับอย่างไร", options: ["นับจากวันสุดท้ายที่มีประจำเดือนจนถึงวันแรกที่มีประจำเดือนรอบถัดไป", "นับจากวันแรกที่มีประจำเดือนจนถึงวันแรกที่มีประจำเดือนรอบถัดไป", "นับจากวันไข่ตกจนถึงวันแรกที่มีประจำเดือน", "นับเฉพาะวันที่มีเลือดประจำเดือนไหลเท่านั้น"], correctAnswer: "นับจากวันแรกที่มีประจำเดือนจนถึงวันแรกที่มีประจำเดือนรอบถัดไป", explanation: "รอบเดือน 1 รอบ เริ่มนับจาก 'วันแรก' ที่มีประจำเดือน ไปจนถึง 'วันก่อน' ที่ประจำเดือนรอบใหม่จะมา" },
      { question: "หากนางสาวบีมีรอบเดือน 28 วัน และประจำเดือนวันแรกของรอบนี้คือวันที่ 10 กุมภาพันธ์ วันที่คาดว่า 'ไข่จะตก' คือวันที่เท่าใด", options: ["วันที่ 24 กุมภาพันธ์", "วันที่ 23 กุมภาพันธ์", "วันที่ 14 กุมภาพันธ์", "วันที่ 17 กุมภาพันธ์"], correctAnswer: "วันที่ 24 กุมภาพันธ์", explanation: "วิธีคิด: ประจำเดือนรอบหน้าคือ 10 ก.พ. + 28 วัน = 10 มี.ค. (ปีปกติ ก.พ.มี 28 วัน) วันไข่ตกคือนับถอยหลัง 14 วันจากรอบหน้า (10 มี.ค. - 14 วัน = 24 ก.พ.)" },
      { question: "นางสาวซีมีรอบเดือนสม่ำเสมอ 30 วัน หากประจำเดือนวันแรกคือวันที่ 1 มีนาคม การตกไข่ของเธอควรเกิดขึ้นในวันที่เท่าใดของเดือนมีนาคม", options: ["วันที่ 14 มีนาคม", "วันที่ 15 มีนาคม", "วันที่ 16 มีนาคม", "วันที่ 17 มีนาคม"], correctAnswer: "วันที่ 17 มีนาคม", explanation: "วิธีคิดที่ง่ายที่สุดคือ 'ความยาวรอบเดือน - 14' (30 - 14 = 16) แปลว่าไข่ตกในวันที่ 16 ของรอบเดือน ถ้านับวันที่ 1 มีนาคมเป็นวันที่ 1 วันที่ 16 ของรอบเดือนก็คือวันที่ 17 มีนาคม (1 + 16 = 17)" }
    ];

    const addDays = (date, days) => { const r = new Date(date); r.setDate(r.getDate() + days); return r; };
    const isSameDay = (d1, d2) => d1 && d2 && d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
    const monthNamesThai = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    const CalendarMonth = ({ currentDate, last, ovulation, next, onDateClick }) => {
      const first = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
      const daysIn = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
      const days = [...Array(first).fill(null), ...Array.from({length: daysIn}, (_, i) => new Date(currentDate.getFullYear(), currentDate.getMonth(), i + 1))];
      return (
        <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-200">
          <p className="text-center font-bold mb-2 text-sm">{monthNamesThai[currentDate.getMonth()]} {currentDate.getFullYear() + 543}</p>
          <div className="grid grid-cols-7 gap-1 text-center mb-1">{['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => <div key={d} className="text-[10px] font-bold text-gray-500">{d}</div>)}</div>
          <div className="grid grid-cols-7 gap-1">
            {days.map((d, i) => !d ? <div key={i} className="h-8"></div> : (
              <button key={i} onClick={() => onDateClick(d)} className={`h-8 w-full rounded-full flex items-center justify-center text-[10px] font-medium ${isSameDay(d, last) ? 'bg-pink-500 text-white' : isSameDay(d, next) ? 'bg-rose-100 border border-rose-400' : isSameDay(d, ovulation) ? 'bg-indigo-500 text-white' : 'hover:bg-gray-100'}`}>
                {d.getDate()}
              </button>
            ))}
          </div>
        </div>
      );
    };

    function App() {
      const [view, setView] = useState('login');
      const [user, setUser] = useState({name: '', avatar: '👩‍🔬'});
      const [score, setScore] = useState(0);
      const [qIdx, setQIdx] = useState(0);
      const [cycleLength, setCycleLength] = useState(28);
      const [last, setLast] = useState(null);
      const [curr, setCurr] = useState(new Date());

      if (view === 'login') return (
        <div className="max-w-md mx-auto pt-12 px-4"><div className="bg-white p-8 rounded-3xl shadow-xl"><h1 className="text-4xl font-black text-center mb-6 text-indigo-600">Mens Sim!</h1><input className="w-full p-4 border rounded-xl mb-4" placeholder="ชื่อผู้เล่น..." onChange={e => setUser({...user, name: e.target.value})} /><div className="flex gap-2 justify-center mb-6">{['👩‍🔬', '👩‍🎓', '👩‍💻', '👩‍⚕️'].map(a => <button key={a} onClick={() => setUser({...user, avatar: a})} className={`text-3xl p-2 rounded-xl ${user.avatar === a ? 'bg-pink-100' : ''}`}>{a}</button>)}</div><button onClick={() => setView('simulator')} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl">เริ่มเกม</button></div></div>
      );

      if (view === 'simulator') return (
        <div className="max-w-4xl mx-auto p-4"><div className="flex justify-between items-center mb-6"><h1 className="text-2xl font-bold flex items-center gap-2"><CalendarIcon />จำลองรอบเดือน</h1><button onClick={() => setView('quiz')} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">ไปแบบทดสอบ</button></div>
          <div className="grid md:grid-cols-2 gap-6">
            <div className="space-y-4">
              <h2 className="font-bold">เลือกรอบเดือน</h2>
              <div className="flex gap-2">{[21, 28, 30, 32].map(l => <button key={l} onClick={() => setCycleLength(l)} className={`px-4 py-2 rounded-full ${cycleLength === l ? 'bg-pink-500 text-white' : 'bg-gray-100'}`}>{l} วัน</button>)}</div>
              
              <div className="flex justify-between items-center mt-6">
                <h2 className="font-bold">จิ้มเลือก "วันแรก" ที่ประจำเดือนมา</h2>
                <div className="flex gap-1">
                  <button onClick={() => setCurr(addDays(curr, -30))} className="p-1 px-2 border rounded text-sm">{'<'}</button>
                  <button onClick={() => setCurr(addDays(curr, 30))} className="p-1 px-2 border rounded text-sm">{'>'}</button>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-2">
                 <CalendarMonth currentDate={curr} last={last} next={last ? addDays(last, cycleLength) : null} ovulation={last ? addDays(addDays(last, cycleLength), -14) : null} onDateClick={setLast} />
                 <CalendarMonth currentDate={new Date(curr.getFullYear(), curr.getMonth() + 1, 1)} last={last} next={last ? addDays(last, cycleLength) : null} ovulation={last ? addDays(addDays(last, cycleLength), -14) : null} onDateClick={setLast} />
              </div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow border text-center">{!last ? <p>เลือกวันในปฏิทิน</p> : <div><p className="text-sm">วันตกไข่</p><p className="text-3xl font-bold text-indigo-600">{addDays(addDays(last, cycleLength), -14).getDate()} {monthNamesThai[addDays(addDays(last, cycleLength), -14).getMonth()]}</p></div>}</div>
          </div>
        </div>
      );

      if (view === 'quiz') return (
        <div className="max-w-2xl mx-auto p-4"><div className="bg-white p-6 rounded-2xl shadow">
          <p className="text-xl mb-6">{quizQuestions[qIdx].question}</p>
          {quizQuestions[qIdx].options.map(opt => <button key={opt} onClick={() => { if (opt === quizQuestions[qIdx].correctAnswer) setScore(s => s + 100); if (qIdx < quizQuestions.length - 1) setQIdx(qIdx + 1); else setView('leaderboard'); }} className="block w-full p-4 border rounded-xl mb-2 hover:bg-gray-50 text-left">{opt}</button>)}
        </div></div>
      );

      return (
        <div className="max-w-lg mx-auto p-4"><div className="bg-white p-8 rounded-3xl text-center shadow-xl"><h1 className="text-3xl font-bold mb-2">จบเกม!</h1><p className="text-2xl font-bold mb-6">{user.name} ได้ {score} แต้ม</p><div className="mb-6"><p className="font-bold border-b pb-2 mb-2">Leaderboard</p><p>1. {user.name} - {score}</p><p>2. น้องกิ๊ฟ - 300</p><p>3. น้องเกม - 200</p></div><button onClick={() => window.location.reload()} className="bg-gray-800 text-white px-8 py-3 rounded-xl font-bold">เล่นใหม่</button></div></div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
